<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d">
  <title id="t">WebFlux BlockHound Guide</title>
  <desc id="d">Thumbnail for BlockHound practical guide</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#fffdf7"/>
    </linearGradient>
    <style>
      .t1{font:700 56px 'Pretendard','Segoe UI',sans-serif;fill:#1f2a44}
      .t2{font:600 24px 'Pretendard','Segoe UI',sans-serif;fill:#5a6275}
      .mono{font:700 23px 'JetBrains Mono',monospace;fill:#a53a3a}
      .ok{fill:#e8faf2;stroke:#97d6b5;stroke-width:1.8;rx:12;ry:12}
      .bad{fill:#fff1f1;stroke:#efb3b3;stroke-width:1.8;rx:12;ry:12}
      .panel{fill:#ffffff;stroke:#e7d1d1;stroke-width:2;rx:16;ry:16}
    </style>
  </defs>
  <rect fill="url(#bg)" x="0" y="0" width="1200" height="630"/>
  <rect class="panel" x="90" y="80" width="1020" height="470"/>

  <text class="t1" x="145" y="220">WebFlux + BlockHound</text>
  <text class="t2" x="145" y="270">Catch blocking calls before production incidents</text>

  <rect class="bad" x="145" y="336" width="380" height="92"/>
  <text class="mono" x="175" y="392">BlockingOperationError</text>

  <rect class="ok" x="565" y="336" width="430" height="92"/>
  <text class="mono" x="600" y="392">Fix in CI, not in prod</text>
</svg>
