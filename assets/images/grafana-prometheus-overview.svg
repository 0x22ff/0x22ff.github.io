<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="t d">
  <title id="t">Architecture Overview</title>
  <desc id="d">Spring Boot, Prometheus, Grafana and MCP end-to-end architecture</desc>
  <defs>
    <style>
      .bg{fill:#f6f9ff}
      .panel{fill:#fff;stroke:#cad6eb;stroke-width:2;rx:14;ry:14}
      .h{font:700 26px 'Pretendard','Segoe UI',sans-serif;fill:#23304d}
      .t{font:500 20px 'Pretendard','Segoe UI',sans-serif;fill:#2b3a5a}
      .m{font:600 18px 'JetBrains Mono',monospace;fill:#3a5aa8}
      .line{stroke:#7e9fd8;stroke-width:3;fill:none;marker-end:url(#a)}
    </style>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7e9fd8"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text x="70" y="76" class="h">Monitoring + Analysis Architecture (Single Service Example)</text>

  <rect class="panel" x="70" y="120" width="250" height="140"/>
  <text x="102" y="176" class="m">Spring Boot 3.x</text>
  <text x="102" y="206" class="t">Java 21 + Micrometer</text>
  <text x="102" y="233" class="t">/actuator/prometheus</text>

  <rect class="panel" x="390" y="120" width="260" height="140"/>
  <text x="440" y="176" class="m">Prometheus</text>
  <text x="430" y="206" class="t">scrape + store TSDB</text>
  <text x="430" y="233" class="t">recording rules</text>

  <rect class="panel" x="720" y="120" width="250" height="140"/>
  <text x="792" y="176" class="m">Grafana</text>
  <text x="760" y="206" class="t">dashboards + alerts</text>
  <text x="760" y="233" class="t">panel drill-down</text>

  <rect class="panel" x="390" y="352" width="260" height="150"/>
  <text x="435" y="410" class="m">Alertmanager</text>
  <text x="425" y="440" class="t">route + silence + group</text>
  <text x="425" y="468" class="t">webhook delivery</text>

  <rect class="panel" x="720" y="352" width="320" height="150"/>
  <text x="765" y="410" class="m">MCP Analyzer Worker</text>
  <text x="755" y="440" class="t">collect context/log/metric</text>
  <text x="755" y="468" class="t">reason + summary report</text>

  <rect class="panel" x="70" y="552" width="970" height="92"/>
  <text x="98" y="607" class="t">Output: Slack/Email/Issue - incident summary, suspected root cause, and next action checklist</text>

  <path class="line" d="M320 190 L390 190"/>
  <path class="line" d="M650 190 L720 190"/>
  <path class="line" d="M845 260 L845 352"/>
  <path class="line" d="M650 428 L720 428"/>
  <path class="line" d="M880 502 L880 552"/>
</svg>
