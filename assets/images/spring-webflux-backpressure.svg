<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">Reactive Streams backpressure</title>
  <desc id="d">Subscriber requests data in chunks and publisher emits accordingly.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fd; }
      .panel { fill: #ffffff; stroke: #cfd8e6; stroke-width: 2; rx: 14; ry: 14; }
      .head { font: 700 24px 'Pretendard','Segoe UI',sans-serif; fill: #1f2a44; }
      .title { font: 700 18px 'Pretendard','Segoe UI',sans-serif; fill: #24324f; }
      .txt { font: 500 14px 'Pretendard','Segoe UI',sans-serif; fill: #4b5a77; }
      .node { fill: #eef4ff; stroke: #b7c9ef; stroke-width: 1.8; rx: 10; ry: 10; }
      .arrow { stroke: #6781b1; stroke-width: 2.4; fill: none; marker-end: url(#a); }
      .req { stroke: #f59e0b; stroke-width: 2.4; fill: none; marker-end: url(#b); }
    </style>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6781b1"/>
    </marker>
    <marker id="b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="560"/>
  <text class="head" x="35" y="50">Backpressure: Consumer Controls the Pace</text>

  <rect class="panel" x="35" y="85" width="1130" height="430"/>

  <rect class="node" x="100" y="220" width="280" height="100"/>
  <text class="title" x="130" y="258">Publisher</text>
  <text class="txt" x="130" y="284">Flux source (DB, queue, stream)</text>

  <rect class="node" x="480" y="220" width="280" height="100"/>
  <text class="title" x="510" y="258">Operator Pipeline</text>
  <text class="txt" x="510" y="284">map / filter / flatMap ...</text>

  <rect class="node" x="860" y="220" width="280" height="100"/>
  <text class="title" x="890" y="258">Subscriber</text>
  <text class="txt" x="890" y="284">Consumes at own speed</text>

  <path class="arrow" d="M380 260 L480 260"/>
  <path class="arrow" d="M760 260 L860 260"/>
  <path class="req" d="M980 340 L240 340"/>

  <text class="txt" x="470" y="190">data signals (onNext)</text>
  <text class="txt" x="510" y="365">request(n) signals travel upstream</text>

  <text class="txt" x="100" y="430">Example: Subscriber requests 32 items -> publisher emits up to 32, then waits for next request.</text>
  <text class="txt" x="100" y="455">Without demand control, fast producer can overwhelm slow consumer.</text>
</svg>
