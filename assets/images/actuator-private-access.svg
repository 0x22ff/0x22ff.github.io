<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">Actuator Private Access</title>
  <desc id="d">Restrict actuator endpoint access to internal network and Prometheus only</desc>
  <defs>
    <style>
      .bg{fill:#f6f9ff}
      .zone{fill:#fff;stroke:#cedaee;stroke-width:2;rx:16;ry:16}
      .h{font:700 24px 'Pretendard','Segoe UI',sans-serif;fill:#243451}
      .t{font:500 18px 'Pretendard','Segoe UI',sans-serif;fill:#364767}
      .m{font:700 16px 'JetBrains Mono',monospace;fill:#3757a4}
      .line{stroke:#82a2db;stroke-width:3;fill:none;marker-end:url(#arr)}
      .deny{fill:#fff2f2;stroke:#e8a6a6}
    </style>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#82a2db"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="640"/>
  <text x="70" y="72" class="h">Production Rule: /actuator is private</text>

  <rect class="zone" x="70" y="130" width="1060" height="420"/>
  <text x="104" y="170" class="t">VPC Internal Network</text>

  <rect class="zone" x="130" y="220" width="260" height="120"/>
  <text x="164" y="270" class="m">Prometheus Server</text>
  <text x="168" y="300" class="t">SG allow outbound</text>

  <rect class="zone" x="500" y="220" width="340" height="120"/>
  <text x="558" y="270" class="m">Spring App (EC2/ECS)</text>
  <text x="560" y="300" class="t">management.port: 18081</text>

  <path class="line" d="M390 280 L500 280"/>
  <text x="410" y="255" class="t">allow</text>

  <rect class="zone deny" x="890" y="220" width="180" height="120"/>
  <text x="924" y="270" class="m">Public Internet</text>
  <text x="932" y="300" class="t">blocked</text>

  <text x="130" y="420" class="t">Recommendation: separate management port + security group restriction + minimal endpoint exposure.</text>
  <text x="130" y="452" class="t">Do not rely only on app-level IP checks behind proxies/load balancers.</text>
</svg>
